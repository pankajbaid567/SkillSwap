name: SkillSwap CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run Tests with Coverage
        run: npm test -- --coverage
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          JWT_SECRET: "test_secret"
          REDIS_URL: "redis://localhost:6379"

  lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skillswap-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Linter
        run: npm run lint

  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skillswap-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Build
        run: npm run build
        env:
          VITE_API_URL: "https://api.skillswap.ai/api"
          VITE_SOCKET_URL: "https://api.skillswap.ai"
